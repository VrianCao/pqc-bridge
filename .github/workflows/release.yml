name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-tag:
    name: Release Tag Policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate release tag
        env:
          RELEASE_GPG_PUBLIC_KEYS: ${{ vars.RELEASE_GPG_PUBLIC_KEYS }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" != "push" ]]; then
            echo "workflow_dispatch dry run: skipping tag verification"
            exit 0
          fi

          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "release workflow push event must run from a tag" >&2
            exit 1
          fi

          semver='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          if [[ ! "${GITHUB_REF_NAME}" =~ ${semver} ]]; then
            echo "tag ${GITHUB_REF_NAME} is not a SemVer release tag" >&2
            exit 1
          fi

          if [[ "$(git cat-file -t "refs/tags/${GITHUB_REF_NAME}")" != "tag" ]]; then
            echo "tag ${GITHUB_REF_NAME} must be an annotated signed tag" >&2
            exit 1
          fi

          if [[ -n "${RELEASE_GPG_PUBLIC_KEYS}" ]]; then
            printf '%s\n' "${RELEASE_GPG_PUBLIC_KEYS}" | gpg --import
          fi

          git tag -v "${GITHUB_REF_NAME}"

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  fuzz-smoke:
    name: Fuzz Target Build Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --manifest-path fuzz/Cargo.toml --bin envelope_decode
      - run: cargo check --manifest-path fuzz/Cargo.toml --bin ffi_primitives

  rust:
    name: Rust, KATs, and Lints
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo check --workspace --all-targets --all-features
      - run: cargo test --workspace --all-targets --all-features
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  bindings:
    name: Binding Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: bindings/node/package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p pqcb-ffi
      - run: npm ci
        working-directory: bindings/node
      - run: npm run check
        working-directory: bindings/node
      - run: npm run smoke:abi
        working-directory: bindings/node
      - run: npm run smoke:primitives
        working-directory: bindings/node
      - run: python -m compileall pqcb
        working-directory: bindings/python
      - run: python smoke_abi.py
        working-directory: bindings/python
      - run: python smoke_primitives.py
        working-directory: bindings/python
      - run: go test ./...
        working-directory: bindings/go

  platform-bindings:
    name: Platform Binding Builds
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - run: javac src/main/java/io/pqcbridge/pqcb/Pqcb.java
        working-directory: bindings/java
      - run: cmake -S bindings/cpp -B bindings/cpp/build
      - run: cmake --build bindings/cpp/build
      - name: Check fixed-width C status ABI
        run: |
          cc -fshort-enums -Ibindings/cpp/include -x c -c -o /tmp/pqcb_status_abi.o - <<'C'
          #include <stdint.h>
          #include "pqcb.h"
          _Static_assert(sizeof(PqcbStatus) == sizeof(uint32_t), "PqcbStatus must stay uint32_t");
          _Static_assert(PQCB_STATUS_PANIC == 255u, "panic status code mismatch");
          int main(void) { return PQCB_STATUS_OK; }
          C

  swift:
    name: Swift Package Build
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - run: swift build
        working-directory: bindings/swift

  package-dry-run:
    name: Package Dry Runs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: bindings/node/package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo package --workspace --all-features --allow-dirty
      - run: npm ci
        working-directory: bindings/node
      - run: npm run pack:dry-run
        working-directory: bindings/node
      - run: python -m pip install --upgrade build
      - run: python -m build --sdist --wheel
        working-directory: bindings/python

  source-materials:
    name: Source Archive, Checksums, and SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - release-tag
      - dependency-audit
      - fuzz-smoke
      - rust
      - bindings
      - platform-bindings
      - swift
      - package-dry-run
    steps:
      - uses: actions/checkout@v6
      - run: git archive --format=tar.gz --output=pqc-bridge-source.tar.gz HEAD
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          dependency-snapshot: false
          upload-artifact: false
          upload-release-assets: false
      - run: shasum -a 256 pqc-bridge-source.tar.gz sbom.spdx.json > SHA256SUMS
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-source-materials
          path: |
            pqc-bridge-source.tar.gz
            SHA256SUMS
            sbom.spdx.json

  attest-release-materials:
    name: Attest Release Materials
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [source-materials]
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-source-materials
      - name: Attest release material provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-checksums: SHA256SUMS
      - name: Attest source SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: pqc-bridge-source.tar.gz
          sbom-path: sbom.spdx.json

  publish-release-assets:
    name: Publish GitHub Release Assets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [attest-release-materials]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-source-materials
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if ! gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release create "${TAG_NAME}" \
              --verify-tag \
              --title "${TAG_NAME}" \
              --notes "Release assets are attached with SHA-256 checksums, an SPDX SBOM, and GitHub artifact attestations."
          fi

          gh release upload "${TAG_NAME}" \
            pqc-bridge-source.tar.gz \
            SHA256SUMS \
            sbom.spdx.json \
            --clobber
