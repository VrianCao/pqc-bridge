title: "[Q&A] "
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to understand or decide?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include language, platform, threat model, or integration details if relevant.
    validations:
      required: false
